<!doctype html>
<html lang="en">
  <head>
  	<title>Login 10</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

	<link href="https://fonts.googleapis.com/css?family=Lato:300,400,700&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	
	<link rel="stylesheet" href="css/style.css">

	</head>
	<body class="img js-fullheight" style="background-image: url(images/bg.jpg);">
	<section class="ftco-section">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-6 text-center mb-5">
					<h2 class="heading-section">Login #10</h2>
				</div>
			</div>
			<div class="row justify-content-center">
				<div class="col-md-6 col-lg-4">
					<div class="login-wrap p-0">
		      	<h3 class="mb-4 text-center">Have an account?</h3>
						<div id="login-feedback" class="alert d-none" role="alert"></div>
		      	<form action="#" class="signin-form" data-redirect="dashboard.html" novalidate>
		      		<div class="form-group">
		      			<input id="username-field" type="text" class="form-control" placeholder="Username" autocomplete="username" required>
		      		</div>
	            <div class="form-group">
	              <input id="password-field" type="password" class="form-control" placeholder="Password" autocomplete="current-password" required>
	              <span toggle="#password-field" class="fa fa-fw fa-eye field-icon toggle-password"></span>
	            </div>
							<div id="sign-in-loader" class="text-center text-light small mb-2 d-none">
								<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
								<span class="sr-only">Signing in...</span>
								<span class="ml-2">Signing in...</span>
							</div>
	            <div class="form-group">
	            	<button id="login-submit" type="submit" class="form-control btn btn-primary submit px-3">Sign In</button>
	            </div>
	            <div class="form-group d-md-flex">
	            	<div class="w-100 text-md-right">
									<a href="#" style="color: #fff" aria-disabled="true">Need help?</a>
								</div>
	            </div>
	          </form>
		      </div>
				</div>
			</div>
		</div>
	</section>

	<div id="toast-container" class="position-fixed" style="top: 20px; right: 20px; z-index: 1060;"></div>

	<script src="js/jquery.min.js"></script>
  <script src="js/popper.js"></script>
  <script src="js/bootstrap.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.48.0/dist/umd/supabase.min.js" integrity="sha256-3qDl1n2YNDdNYsM8oFb6kP3UjObb8VcS3EWAaAqsxPQ=" crossorigin="anonymous"></script>
	<script src="js/supabaseClient.js"></script>
  <script src="js/main.js"></script>

	</body>
</html>
