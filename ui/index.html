<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TheTrendScope | Passbolt Import Center</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg" />
  <link rel="alternate icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="mask-icon" href="/assets/logo-full.svg" color="#E08A34" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <img src="/assets/passbolt.png" alt="TheTrendScope" onerror="this.onerror=null;this.src='/assets/logo-full.svg';" />
        <div>
          <h1>TheTrendScope</h1>
          <p>Import & supervision Passbolt</p>
        </div>
      </div>
      <nav class="menu">
        <a class="menu-item active" href="#" data-view="dashboardView">Dashboard</a>
        <a class="menu-item" href="#" data-view="importerView">Importer</a>
        <a class="menu-item" href="#" data-view="deletionsView">Suppressions</a>
        <a class="menu-item" href="#" data-view="historyView">Historique</a>
        <a class="menu-item" href="#" data-view="logsAuditView">Logs & audit</a>
      </nav>
      <div class="system-pulse" id="systemPulse"></div>
    </aside>

    <main class="main-content">
      <section id="dashboardView" class="view-section active-view"></section>
      <section id="importerView" class="view-section"></section>
      <section id="deletionsView" class="view-section"></section>
      <section id="historyView" class="view-section"></section>
      <section id="logsAuditView" class="view-section"></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/script.js"></script>
</body>
</html>
