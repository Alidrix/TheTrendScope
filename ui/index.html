<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passbolt CSV Import</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0d1b2a; color: #fff; }
    .wrap { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .card { background: #1b263b; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
    button { background: #f4a261; border: 0; border-radius: 8px; color: #fff; padding: 10px 14px; cursor: pointer; }
    .muted { color: #b9c5d4; }
    .progress { width: 100%; height: 10px; border-radius: 10px; background: #31445e; overflow: hidden; margin-top: 10px; }
    .bar { height: 100%; width: 0%; background: #2a9d8f; transition: width 0.2s; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 14px; }
    th, td { text-align: left; border-bottom: 1px solid #415a77; padding: 8px; }
    .ok { color: #70e000; }
    .ko { color: #ff6b6b; }
    .logs { margin-top: 10px; background: #0a1422; border: 1px solid #415a77; border-radius: 8px; padding: 10px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; height: 220px; overflow-y: auto; white-space: pre-wrap; }
    #toast { position: fixed; right: 16px; bottom: 16px; background: #1b263b; border: 1px solid #415a77; padding: 10px 12px; border-radius: 8px; display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>Passbolt CSV Importer</h2>
    <p class="muted">CSV attendu: <code>email,firstname,lastname,role</code></p>

    <div class="card">
      <input type="file" id="file" accept=".csv" />
      <button id="uploadBtn">Importer</button>
      <div class="progress"><div id="bar" class="bar"></div></div>
      <p id="summary" class="muted"></p>
      <h3>Commandes & logs</h3>
      <div id="logs" class="logs"></div>
    </div>

    <div class="card">
      <h3>Résultats</h3>
      <table>
        <thead><tr><th>Email</th><th>Status</th><th>Détails</th></tr></thead>
        <tbody id="results"></tbody>
      </table>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const fileInput = document.getElementById('file');
    const uploadBtn = document.getElementById('uploadBtn');
    const resultsBody = document.getElementById('results');
    const summary = document.getElementById('summary');
    const bar = document.getElementById('bar');
    const toast = document.getElementById('toast');
    const logsBox = document.getElementById('logs');
    const REQUEST_TIMEOUT_MS = 60000;

    function showToast(message) {
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2500);
    }

    function appendLog(prefix, message) {
      logsBox.textContent += `[${new Date().toLocaleTimeString()}] ${prefix} ${message}\n`;
      logsBox.scrollTop = logsBox.scrollHeight;
    }

    function renderResults(payload) {
      const rows = payload.results || [];
      rows.forEach((row) => {
        const ok = row.returncode === 0;
        const detail = row.stderr || row.stdout || '-';
        resultsBody.insertAdjacentHTML('beforeend', `<tr><td>${row.email || ''}</td><td class="${ok ? 'ok' : 'ko'}">${ok ? 'OK' : 'ERREUR'}</td><td>${detail}</td></tr>`);
      });
      summary.textContent = `Import terminé: ${payload.success || 0}/${payload.total || 0}`;
      bar.style.width = '100%';
      showToast('Import terminé');
    }

    async function parseJsonResponse(response) {
      const contentType = response.headers.get('content-type') || '';
      const body = await response.text();

      if (!contentType.includes('application/json')) {
        const clean = body.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
        throw new Error(clean || `Réponse non JSON (HTTP ${response.status})`);
      }

      try {
        return JSON.parse(body);
      } catch (_) {
        throw new Error(`JSON invalide reçu du serveur (HTTP ${response.status})`);
      }
    }

    async function importFallback(form, signal) {
      appendLog('INFO', 'Endpoint /import-stream indisponible (404), fallback vers /import');
      const response = await fetch('/import', { method: 'POST', body: form, signal });
      try {
        const payload = await parseJsonResponse(response);
        if (!response.ok) {
          throw new Error(payload.error || `Erreur import (HTTP ${response.status})`);
        }
        renderResults(payload);
      } catch (error) {
        if (response.status >= 500) {
          appendLog('ERR', 'Le endpoint /import répond en 500 (API probablement ancienne ou en erreur).');
          appendLog('DBG', 'Action recommandée: docker compose down && docker compose up -d --build');
        }
        throw error;
      }
    }


    async function pingApi() {
      const response = await fetch('/health');
      const payload = await parseJsonResponse(response);
      if (!response.ok) {
        throw new Error(payload.error || 'Healthcheck API en erreur');
      }
      appendLog('INFO', `Ping API OK | container=${payload.container} | cli=${payload.cli_path}`);
      return payload;
    }

    async function runAutoDebug() {
      appendLog('INFO', 'Auto-debug déclenché');
      try {
        const response = await fetch('/debug/import');
        if (response.status === 404) {
          appendLog('DBG', 'Endpoint /debug/import indisponible sur cette version API.');
          const healthResp = await fetch('/health');
          const healthPayload = await parseJsonResponse(healthResp);
          appendLog('DBG', `Health status=${healthPayload.status} container=${healthPayload.container} cli=${healthPayload.cli_path}`);
          appendLog('DBG', 'Action recommandée: mettre à jour/rebuild l'API pour activer /debug/import et /import-stream.');
          return;
        }
        const payload = await parseJsonResponse(response);
        const checks = payload?.diagnostics?.checks || [];
        checks.forEach((check) => {
          appendLog('DBG', `${check.name}: ${check.ok ? 'OK' : 'KO'} ${check.selected || ''}`.trim());
        });
        const recommendations = payload?.diagnostics?.recommendations || [];
        recommendations.forEach((item) => appendLog('DBG', `Reco: ${item}`));
      } catch (error) {
        appendLog('ERR', `Auto-debug impossible: ${error.message || String(error)}`);
      }
    }

    uploadBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        showToast('Sélectionne un CSV');
        return;
      }

      uploadBtn.disabled = true;
      bar.style.width = '10%';
      resultsBody.innerHTML = '';
      logsBox.textContent = '';
      summary.textContent = 'Import en cours...';
      appendLog('INFO', `Fichier: ${file.name}`);

      const form = new FormData();
      form.append('file', file);

      let timer = null;

      try {
        await pingApi();

        const controller = new AbortController();
        timer = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

        const response = await fetch('/import-stream', { method: 'POST', body: form, signal: controller.signal });
        if (response.status === 404) {
          await importFallback(form, controller.signal);
          return;
        }
        if (!response.ok || !response.body) {
          const message = await response.text();
          throw new Error(message || 'Réponse invalide');
        }

        bar.style.width = '30%';
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalPayload = null;

        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            break;
          }
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed) continue;
            if (!trimmed.startsWith('{')) {
              throw new Error(`Flux non JSON reçu: ${trimmed.slice(0, 160)}`);
            }
            const entry = JSON.parse(trimmed);
            if (entry.type === 'command') appendLog('CMD', entry.message);
            if (entry.type === 'stdout') appendLog('OUT', entry.message);
            if (entry.type === 'stderr') appendLog('ERR', entry.message);
            if (entry.type === 'log') appendLog('INFO', entry.message);
            if (entry.type === 'final') finalPayload = entry.payload;
          }
          bar.style.width = '75%';
        }

        if (finalPayload) {
          clearTimeout(timer);
          renderResults(finalPayload);
        } else {
          throw new Error('Aucun résultat final reçu');
        }
      } catch (error) {
        if (error.name === 'AbortError') {
          appendLog('ERR', `Timeout global atteint (${REQUEST_TIMEOUT_MS / 1000}s)`);
          summary.textContent = 'Import timeout (debug automatique lancé)';
          await runAutoDebug();
        } else {
          appendLog('ERR', error.message || String(error));
          summary.textContent = 'Import interrompu (voir logs)';
          await runAutoDebug();
        }
        showToast('Erreur import');
        bar.style.width = '100%';
      } finally {
        if (timer) clearTimeout(timer);
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
