<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passbolt Cockpit</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <img src="/assets/passbolt.svg" alt="Logo Passbolt" onerror="this.onerror=null;this.src='/assets/favicon.svg';" />
      </div>
      <nav class="menu">
        <a class="menu-item active" href="#" data-view="dashboardView">Dashboard</a>
        <a class="menu-item" href="#" data-view="importerView">Importer</a>
        <a class="menu-item" href="#" data-view="deletionsView">Suppressions</a>
        <a class="menu-item" href="#" data-view="historyView">Historique</a>
        <a class="menu-item" href="#" data-view="logsAuditView">Logs & audit</a>
      </nav>
    </aside>

    <main class="main-content">
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Basculer le thème" title="Basculer le thème">🌙</button>
      <section id="dashboardView" class="view-section active-view"></section>
      <section id="importerView" class="view-section"></section>
      <section id="deletionsView" class="view-section"></section>
      <section id="historyView" class="view-section"></section>
      <section id="logsAuditView" class="view-section"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
