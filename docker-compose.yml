services:
  importer-api:
    build: ./api
    container_name: passbolt-import-api
    ports:
      - "${IMPORTER_API_PORT:-9090}:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - PASSBOLT_CONTAINER=${PASSBOLT_CONTAINER:-passbolt-passbolt-1}
      - PASSBOLT_CLI_PATH=${PASSBOLT_CLI_PATH:-/usr/share/php/passbolt/bin/cake}
      - IMPORT_COMMAND_TIMEOUT=${IMPORT_COMMAND_TIMEOUT:-60}
      - IMPORT_TOTAL_TIMEOUT=${IMPORT_TOTAL_TIMEOUT:-60}
      - PASSBOLT_URL=${PASSBOLT_URL:-}
      - PASSBOLT_API_TOKEN=${PASSBOLT_API_TOKEN:-}
      - PASSBOLT_VERIFY_TLS=${PASSBOLT_VERIFY_TLS:-true}
    restart: unless-stopped

  importer-ui:
    image: nginx:alpine
    container_name: passbolt-import-ui
    ports:
      - "${IMPORTER_UI_PORT:-9091}:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./ui/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
